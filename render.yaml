services:
  - type: web
    name: flashdash
    runtime: python
    pythonVersion: "3.11"
    buildCommand: "echo 'No build step needed'"
    startCommand: python3 server.py
    plan: free
    envVars:
      - key: TEACHER_PASSWORD
        value: teacher123
      - key: UNSPLASH_ACCESS_KEY
        value: ""
      - key: SPEECHIFY_API_KEY
        value: ""
      - key: SPEECHIFY_VOICE_ID
        value: "george"
      - key: PORT
        value: "10000"
